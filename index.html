<!DOCTYPE html>
<html>
<head>
<title>Otaku Tiers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Minecraft', Arial;
  background:#0a0a0a;
  color:#ffd700;
  max-width:420px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}
.title{font-size:18px}
.logo{height:40px}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  padding:0 10px 10px;
  overflow-x:auto;
}
.tab{
  background:#111;
  border:1px solid #333;
  padding:6px 10px;
  border-radius:6px;
  color:#aaa;
  cursor:pointer;
}
.tab.active{
  background:#ffd700;
  color:black;
}

/* SEARCH */
.search input{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:8px;
  border:1px solid #ffd700;
  background:#111;
  color:#ffd700;
}

/* CARD */
.card{
  background:#111;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid #ffd700;
  transition: all 0.35s ease;
}
.card:hover{
  transform:scale(1.02);
}

/* TOP */
.top1{box-shadow:0 0 12px gold}
.top2{box-shadow:0 0 10px silver}
.top3{box-shadow:0 0 8px #cd7f32}

/* MOVE ANIMATION */
.move{
  transform:scale(1.04);
  box-shadow:0 0 12px #ffd700;
}

/* PLAYER */
.player{display:flex;gap:10px;align-items:center}
.player img{width:40px;border-radius:8px}
.name{font-weight:bold}
.meta{font-size:12px;color:#ccc}

/* ICON GRID */
.icons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}
.icon{text-align:center}
.icon img{
  width:26px;
  padding:5px;
  background:black;
  border-radius:50%;
  border:2px solid #ffd700;
  image-rendering:pixelated;
}

/* TIERS */
.tier{
  font-size:10px;
  margin-top:3px;
  padding:2px 5px;
  border-radius:4px;
  font-weight:bold;
}
.ht{
  background:#ffd700;
  color:black;
  box-shadow:0 0 6px #ffd700;
}
.lt{
  background:#3b82ff;
  color:white;
  box-shadow:0 0 5px #3b82ff;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  justify-content:center;
  align-items:center;
}
.popupBox{
  background:#111;
  padding:15px;
  border-radius:10px;
  width:80%;
  border:1px solid #ffd700;
}

/* ADMIN */
.admin{display:none;padding:10px}
button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:#ffd700;
  color:black;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">⛏️ OTAKU TIERS</div>
  <img src="otaku.png" class="logo" onerror="this.style.display='none'">
</div>

<div class="tabs" id="tabs"></div>

<div class="search">
<input id="search" placeholder="Search player...">
</div>

<div id="list"></div>

<!-- ADMIN -->
<div class="admin" id="admin">
<input id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">
<input id="name" placeholder="Name">
<input id="region" placeholder="Region">
<input id="mode" placeholder="Mode">
<input id="tier" placeholder="HT1/LT1">
<button onclick="addPlayer()">Add Player</button>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popupBox" id="profile"></div>
</div>

<script>

const ADMIN_PASS="Wotakutierlist";

const ICONS={
Sword:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/44/Diamond_Sword_JE3_BE3.png",
Axe:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/2/2d/Diamond_Axe_JE3_BE3.png",
Crystal:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/6/6e/End_Crystal_JE2_BE2.png",
UHC:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3e/Golden_Apple_JE2_BE2.png",
SMP:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3e/Grass_Block_JE7_BE6.png"
};

let modes=["Overall","Crystal","Sword","Axe","UHC","SMP"];
let current="Overall";

let players=JSON.parse(localStorage.getItem("players"))||[
{name:"Ayaxis_Shark",region:"NA",modes:{Crystal:"HT1",Sword:"HT1"}},
{name:"NoobieChips",region:"NA",modes:{Axe:"LT1"}},
{name:"UnitedPlayzZ",region:"EU",modes:{UHC:"HT2"}}
];

let lastOrder={};

/* POINTS */
function pts(t){
if(t=="HT1")return 40;
if(t=="HT2")return 30;
if(t=="HT3")return 20;
if(t=="LT1")return 15;
if(t=="LT2")return 10;
if(t=="LT3")return 5;
return 0;
}

/* SCORE */
function score(p){
let s=0;
Object.values(p.modes).forEach(t=>s+=pts(t));
return s;
}

/* RANK */
function rank(s){
if(s>=200)return"Grandmaster";
if(s>=150)return"Master";
if(s>=100)return"Ace";
if(s>=60)return"Specialist";
if(s>=30)return"Beginner";
return"Newbie";
}

/* TABS */
function renderTabs(){
document.getElementById("tabs").innerHTML=
modes.map(m=>`<div class="tab ${m==current?"active":""}" onclick="switchMode('${m}')">${m}</div>`).join("");
}
renderTabs();

function switchMode(m){
current=m;
render();
renderTabs();
}

/* RENDER */
function render(){
let list=players.map(p=>({...p,score:score(p)}))
.sort((a,b)=>b.score-a.score);

let html="";

list.forEach((p,i)=>{

if(current!="Overall" && !p.modes[current]) return;

let moved = lastOrder[p.name]!==undefined && lastOrder[p.name]!==i;
lastOrder[p.name]=i;

let crown=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=`
<div class="card top${i<3?i+1:""} ${moved?"move":""}" onclick="openProfile('${p.name}')">
<div class="player">
<img src="https://mc-heads.net/avatar/${p.name}">
<div>
<div class="name">${crown} #${i+1} ${p.name}</div>
<div class="meta">${p.region} • ${rank(p.score)} • ${p.score} pts</div>
</div>
</div>

<div class="icons">
${Object.entries(p.modes).map(([m,t])=>`
<div class="icon">
<img src="${ICONS[m]||ICONS.Sword}">
<div class="tier ${t.startsWith("HT")?"ht":"lt"}">${t}</div>
</div>`).join("")}
</div>

</div>`;
});

document.getElementById("list").innerHTML=html;
}
render();

/* SEARCH */
document.getElementById("search").onkeyup=function(){
let v=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
};

/* PROFILE */
function openProfile(name){
let p=players.find(x=>x.name==name);
document.getElementById("profile").innerHTML=
`<h3>${p.name}</h3><p>${p.region}</p><p>${rank(score(p))}</p>`;
document.getElementById("popup").style.display="flex";
}

/* ADMIN */
function login(){
if(document.getElementById("pass").value==ADMIN_PASS){
document.getElementById("panel").style.display="block";
}
}

function addPlayer(){
let name=document.getElementById("name").value.trim();
let region=document.getElementById("region").value.trim()||"NA";
let mode=document.getElementById("mode").value.trim();
let tier=document.getElementById("tier").value.trim().toUpperCase();

if(!name||!mode||!tier){
alert("Fill all fields");
return;
}

let p=players.find(x=>x.name.toLowerCase()==name.toLowerCase());

if(!p){
p={name,region,modes:{}};
players.push(p);
}

p.modes[mode]=tier;

localStorage.setItem("players",JSON.stringify(players));
render();
}

/* ADMIN PAGE */
if(location.hash=="#admin"){
document.getElementById("admin").style.display="block";
document.getElementById("list").style.display="none";
}

/* AUTO REFRESH */
setInterval(render,3000);

</script>

</body>
</html>
